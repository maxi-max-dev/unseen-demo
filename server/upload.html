<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>空间记忆 · 上传即合成</title>
<style>
  :root{ --cream:#f6f2ea; --ink:#3a352f; --sub:#9a9186; --red:#c0392b; --gold:#b08d57; }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ margin:0; min-height:100%; }
  body{
    min-height:100vh; display:flex; flex-direction:column; align-items:center;
    background: radial-gradient(120% 80% at 50% 0%, #fbf8f2 0%, var(--cream) 55%, #efe8dc 100%);
    color:var(--ink); font-family:-apple-system,"PingFang SC",system-ui,sans-serif;
    padding:36px 18px calc(40px + env(safe-area-inset-bottom,0));
  }
  .wrap{ width:100%; max-width:460px; margin:0 auto; }

  .kicker{ font-size:11px; letter-spacing:4px; color:var(--gold); font-weight:700; text-align:center; margin-bottom:10px; }
  .kicker span{ opacity:.6; letter-spacing:2px; }
  h1{
    font-family:"Songti SC","STSong",serif; font-size:26px; font-weight:600;
    text-align:center; margin:0 0 8px; letter-spacing:1px;
  }
  .lead{ font-size:13.5px; line-height:1.8; color:#6f675d; text-align:center; margin:0 0 30px; }

  .section-title{ font-size:12.5px; font-weight:700; color:var(--ink); margin:22px 0 9px; display:flex; align-items:center; gap:6px; }
  .section-title .req{ color:var(--red); font-size:11px; font-weight:700; }
  .section-title .opt{ color:var(--sub); font-size:11px; font-weight:600; }

  .dropzone{
    position:relative; border:1.5px dashed #d9cfbe; border-radius:16px;
    background:#fffdf9; padding:20px 16px; text-align:center; cursor:pointer;
    transition:border-color .15s ease, background .15s ease;
  }
  .dropzone:active{ transform:scale(.995); }
  .dropzone.drag{ border-color:var(--red); background:#fdf3f1; }
  .dropzone.filled{ border-style:solid; border-color:var(--gold); background:#fffaf0; }
  .dropzone input[type=file]{ position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; }
  .dz-icon{ font-size:22px; margin-bottom:6px; opacity:.75; }
  .dz-text{ font-size:12.5px; color:#6f675d; line-height:1.6; }
  .dz-text b{ color:var(--ink); }
  .dz-sub{ font-size:10.5px; color:var(--sub); margin-top:4px; }

  .thumb-row{ display:flex; flex-wrap:wrap; gap:8px; margin-top:10px; }
  .thumb{ position:relative; width:64px; height:64px; border-radius:10px; overflow:hidden; box-shadow:0 2px 8px rgba(0,0,0,.15); flex:none; }
  .thumb img, .thumb video{ width:100%; height:100%; object-fit:cover; display:block; }
  .thumb .rm{
    position:absolute; top:2px; right:2px; width:18px; height:18px; border-radius:50%;
    background:rgba(0,0,0,.55); color:#fff; font-size:12px; line-height:18px; text-align:center;
    cursor:pointer;
  }
  .pano-preview{ margin-top:12px; border-radius:12px; overflow:hidden; box-shadow:0 4px 16px rgba(0,0,0,.18); }
  .pano-preview img, .pano-preview video{ width:100%; display:block; max-height:180px; object-fit:cover; }

  .cta{
    display:flex; align-items:center; justify-content:center; gap:9px; width:100%;
    background:var(--red); color:#fff; font-size:15.5px; font-weight:700; letter-spacing:1px;
    border:none; height:54px; border-radius:27px; margin-top:28px; cursor:pointer;
    box-shadow:0 8px 24px rgba(192,57,43,.34); transition:transform .15s ease, opacity .15s ease;
  }
  .cta:active{ transform:scale(.97); }
  .cta:disabled{ opacity:.45; box-shadow:none; cursor:not-allowed; }

  .hint-err{ display:none; margin-top:14px; padding:12px 14px; border-radius:12px;
    background:#fdf0ee; color:var(--red); font-size:12.5px; line-height:1.6; text-align:center; }
  .hint-err.on{ display:block; }

  footer{ margin-top:32px; font-size:10.5px; color:#b8b0a4; letter-spacing:.5px; text-align:center; }

  /* ---------------- 合成中全屏遮罩 ---------------- */
  .overlay{
    position:fixed; inset:0; z-index:50; display:none; align-items:center; justify-content:center;
    background:rgba(58,53,47,.92); padding:24px;
  }
  .overlay.on{ display:flex; }
  .overlay-card{ text-align:center; color:#f6f2ea; max-width:300px; }
  .spin{
    width:38px; height:38px; margin:0 auto 20px; border-radius:50%;
    border:3px solid rgba(255,255,255,.2); border-top-color:var(--red);
    animation:spin .9s linear infinite;
  }
  @keyframes spin{ to{ transform:rotate(360deg); } }
  .overlay-step{ font-size:14.5px; font-weight:600; margin-bottom:8px; }
  .overlay-sub{ font-size:12px; color:#cfc7ba; line-height:1.7; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="kicker">空间记忆 <span>· SPATIAL MEMORY</span></div>
    <h1>上传即合成</h1>
    <p class="lead">传一张全景(图或视频)+ 几张现场照片,<br>AI 在本地把照片放回它们被拍下的空间,<br>算好深度,直接走进去看。</p>

    <div class="section-title">全景图 / 全景视频 <span class="req">必选一项</span></div>
    <div class="dropzone" id="dzPano">
      <input type="file" id="inputPano" accept="image/*,video/*">
      <div class="dz-icon">🖼️</div>
      <div class="dz-text"><b>点击选择</b>或拖拽到此处</div>
      <div class="dz-sub">支持全景图片(jpg/png)或全景视频(取第 1 帧)</div>
    </div>
    <div class="pano-preview" id="panoPreview" style="display:none"></div>

    <div class="section-title">现场照片 <span class="opt">可选,可多选</span></div>
    <div class="dropzone" id="dzPhotos">
      <input type="file" id="inputPhotos" accept="image/*" multiple>
      <div class="dz-icon">📷</div>
      <div class="dz-text"><b>点击选择</b>或拖拽到此处(可多选)</div>
      <div class="dz-sub">AI 会自动算出每张照片在空间里的方位</div>
    </div>
    <div class="thumb-row" id="photoThumbs"></div>

    <button class="cta" id="btnCompose" type="button" disabled>开始合成</button>
    <div class="hint-err" id="errBox"></div>

    <footer>全程本地处理 · 断网可用 · AdventureX 2026</footer>
  </div>

  <div class="overlay" id="overlay">
    <div class="overlay-card">
      <div class="spin"></div>
      <div class="overlay-step" id="overlayStep">AI 正在把照片放回空间…</div>
      <div class="overlay-sub" id="overlaySub">本地计算,不联网,通常需要几十秒到几分钟</div>
    </div>
  </div>

<script>
(function () {
  "use strict";

  function $(id) { return document.getElementById(id); }

  var panoFile = null;
  var photoFiles = []; // File[]

  var dzPano = $("dzPano"), inputPano = $("inputPano"), panoPreview = $("panoPreview");
  var dzPhotos = $("dzPhotos"), inputPhotos = $("inputPhotos"), photoThumbs = $("photoThumbs");
  var btnCompose = $("btnCompose");
  var errBox = $("errBox");
  var overlay = $("overlay"), overlayStep = $("overlayStep");

  function showErr(msg) {
    errBox.textContent = msg;
    errBox.classList.add("on");
  }
  function clearErr() {
    errBox.classList.remove("on");
    errBox.textContent = "";
  }

  function refreshCta() {
    btnCompose.disabled = !panoFile;
  }

  // ---------------- 全景：单文件，图或视频 ----------------
  function setPano(file) {
    if (!file) return;
    panoFile = file;
    dzPano.classList.add("filled");
    var url = URL.createObjectURL(file);
    var isVideo = file.type.indexOf("video/") === 0 || /\.(mp4|mov|m4v|avi|mkv|webm)$/i.test(file.name);
    panoPreview.innerHTML = isVideo
      ? '<video src="' + url + '" muted playsinline controls></video>'
      : '<img src="' + url + '" alt="全景预览">';
    panoPreview.style.display = "block";
    clearErr();
    refreshCta();
  }

  inputPano.addEventListener("change", function () {
    if (inputPano.files && inputPano.files[0]) setPano(inputPano.files[0]);
  });

  ["dragover", "dragenter"].forEach(function (ev) {
    dzPano.addEventListener(ev, function (e) { e.preventDefault(); dzPano.classList.add("drag"); });
  });
  ["dragleave", "drop"].forEach(function (ev) {
    dzPano.addEventListener(ev, function (e) { e.preventDefault(); dzPano.classList.remove("drag"); });
  });
  dzPano.addEventListener("drop", function (e) {
    var f = e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0];
    if (f) setPano(f);
  });

  // ---------------- 照片：多文件 ----------------
  function renderPhotoThumbs() {
    photoThumbs.innerHTML = "";
    photoFiles.forEach(function (file, idx) {
      var url = URL.createObjectURL(file);
      var el = document.createElement("div");
      el.className = "thumb";
      el.innerHTML = '<img src="' + url + '" alt=""><span class="rm" data-idx="' + idx + '">×</span>';
      photoThumbs.appendChild(el);
    });
    if (photoFiles.length) dzPhotos.classList.add("filled"); else dzPhotos.classList.remove("filled");
  }

  function addPhotos(fileList) {
    for (var i = 0; i < fileList.length; i++) {
      if (fileList[i].type.indexOf("image/") === 0) photoFiles.push(fileList[i]);
    }
    renderPhotoThumbs();
    clearErr();
  }

  inputPhotos.addEventListener("change", function () {
    if (inputPhotos.files && inputPhotos.files.length) addPhotos(inputPhotos.files);
    inputPhotos.value = ""; // 允许连续多次选择同名文件
  });

  photoThumbs.addEventListener("click", function (e) {
    var rm = e.target.closest(".rm");
    if (!rm) return;
    var idx = parseInt(rm.getAttribute("data-idx"), 10);
    photoFiles.splice(idx, 1);
    renderPhotoThumbs();
  });

  ["dragover", "dragenter"].forEach(function (ev) {
    dzPhotos.addEventListener(ev, function (e) { e.preventDefault(); dzPhotos.classList.add("drag"); });
  });
  ["dragleave", "drop"].forEach(function (ev) {
    dzPhotos.addEventListener(ev, function (e) { e.preventDefault(); dzPhotos.classList.remove("drag"); });
  });
  dzPhotos.addEventListener("drop", function (e) {
    var files = e.dataTransfer && e.dataTransfer.files;
    if (files && files.length) addPhotos(files);
  });

  // ---------------- 提交合成 ----------------
  var STEP_MESSAGES = [
    "AI 正在把照片放回空间…",
    "计算每张照片的朝向…",
    "生成空间深度中…这一步最慢,耐心等等",
  ];

  function cycleSteps() {
    var i = 0;
    overlayStep.textContent = STEP_MESSAGES[0];
    return setInterval(function () {
      i = (i + 1) % STEP_MESSAGES.length;
      overlayStep.textContent = STEP_MESSAGES[i];
    }, 4000);
  }

  btnCompose.addEventListener("click", function () {
    if (!panoFile) { showErr("先选一张全景图或全景视频"); return; }
    clearErr();
    overlay.classList.add("on");
    var timer = cycleSteps();

    var fd = new FormData();
    fd.append("panorama", panoFile, panoFile.name);
    photoFiles.forEach(function (f) { fd.append("photos", f, f.name); });

    fetch("/compose", { method: "POST", body: fd })
      .then(function (r) { return r.json(); })
      .then(function (data) {
        clearInterval(timer);
        if (data && data.ok) {
          overlayStep.textContent = "合成完成,进入空间…";
          location.href = data.viewUrl;
        } else {
          overlay.classList.remove("on");
          showErr("合成失败: " + ((data && data.error) || "未知错误"));
        }
      })
      .catch(function (e) {
        clearInterval(timer);
        overlay.classList.remove("on");
        showErr("请求失败,请确认本地服务是否在跑(localhost:8777): " + (e && e.message ? e.message : e));
      });
  });

  refreshCta();
})();
</script>
</body>
</html>
