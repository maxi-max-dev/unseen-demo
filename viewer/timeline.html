<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>空间记忆 · 时光轴</title>
<style>
  :root {
    --bg: #17110d;
    --bg-deep: #120d09;
    --red: #c0392b;
    --red-soft: rgba(192,57,43,.45);
    --text: #f4ece1;
    --text-dim: #b7a696;
    --line: rgba(255,255,255,.12);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; height: 100%; background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", system-ui, sans-serif;
    overscroll-behavior: none;
  }
  body {
    background:
      radial-gradient(ellipse 120% 60% at 50% -10%, #2b1c13 0%, transparent 60%),
      linear-gradient(180deg, #1c140e 0%, var(--bg) 40%, var(--bg-deep) 100%);
  }

  #app {
    height: 100vh; height: 100dvh;
    display: flex; flex-direction: column;
    overflow: hidden;
  }

  /* ---------------- 顶部条 ---------------- */
  header.top {
    flex: 0 0 auto;
    display: flex; align-items: center; justify-content: space-between; gap: 10px;
    padding: calc(12px + env(safe-area-inset-top, 0px)) 16px 12px;
    position: relative; z-index: 6;
    background: linear-gradient(180deg, rgba(23,17,13,.85), rgba(23,17,13,0));
  }
  .top-title { min-width: 0; }
  .top-title h1 {
    margin: 0; font-weight: 600; letter-spacing: .02em;
    font-size: clamp(14px, 4.2vw, 18px);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .top-title .sub {
    display: block; margin-top: 2px;
    font-size: 11px; color: var(--text-dim); font-weight: 400;
  }
  .now-pill {
    flex: 0 0 auto;
    display: flex; align-items: center; gap: 7px;
    font-size: clamp(12px, 3.6vw, 14px); font-weight: 500;
    background: rgba(255,255,255,.06); border: 1px solid var(--line);
    padding: 7px 13px; border-radius: 999px; white-space: nowrap;
    backdrop-filter: blur(6px);
  }
  .now-pill .dot {
    width: 7px; height: 7px; border-radius: 50%; flex: 0 0 auto;
    background: var(--red); box-shadow: 0 0 9px var(--red-soft);
  }

  /* ---------------- 中间拼贴区 ---------------- */
  main.stage {
    position: relative; flex: 1 1 auto; min-height: 0;
  }
  main.stage::before {
    content: ""; position: absolute; inset: 0; z-index: 0; pointer-events: none;
    background-image: radial-gradient(rgba(255,255,255,.04) 1px, transparent 1px);
    background-size: 15px 15px;
  }
  .boot-error {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    padding: 24px; text-align: center; color: var(--text-dim); font-size: 14px; z-index: 3;
  }

  .collage-layer {
    position: absolute; inset: 0; z-index: 1;
    overflow-y: auto; -webkit-overflow-scrolling: touch;
    padding: 18px 14px 26px;
    column-count: 2; column-gap: 12px;
    opacity: 0; transform: scale(.96);
    pointer-events: none;
    transition: opacity .32s ease, transform .32s ease;
  }
  @media (min-width: 640px) {
    .collage-layer { column-count: 3; padding: 22px 26px 30px; column-gap: 18px; }
  }
  @media (min-width: 1000px) {
    .collage-layer { column-count: 4; }
  }
  .collage-layer.active { opacity: 1; transform: scale(1); pointer-events: auto; z-index: 2; }
  .collage-layer.leaving { opacity: 0; transform: scale(.96); pointer-events: none; z-index: 1; }

  .polaroid {
    display: block;
    break-inside: avoid; -webkit-column-break-inside: avoid;
    background: #fbf7ef;
    padding: 8px 8px 12px;
    border-radius: 4px;
    box-shadow: 0 16px 32px -10px rgba(0,0,0,.55), 0 3px 8px rgba(0,0,0,.3);
    margin: 0 0 16px;
    position: relative;
    cursor: pointer;
    animation-name: photoIn;
    animation-duration: .55s;
    animation-timing-function: cubic-bezier(.22,.85,.32,1.05);
    animation-delay: var(--delay, 0ms);
    animation-fill-mode: both;
  }
  @keyframes photoIn {
    0%   { opacity: 0; transform: rotate(var(--rot,0deg)) scale(.82) translateY(14px); }
    100% { opacity: 1; transform: rotate(var(--rot,0deg)) scale(1) translateY(0); }
  }
  .ph-frame {
    width: 100%; overflow: hidden; border-radius: 2px; background: #0a0a0a;
    aspect-ratio: var(--ar, 4/3);
  }
  .ph-frame img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .polaroid figcaption {
    font-size: 11px; color: #5b5049; text-align: center; letter-spacing: .02em;
    margin-top: 8px;
  }
  .polaroid.tape-r::before,
  .polaroid.tape-c::before {
    content: ""; position: absolute; top: -9px; left: 50%; width: 52px; height: 18px;
    box-shadow: 0 1px 3px rgba(0,0,0,.3);
  }
  .polaroid.tape-r::before { background: rgba(192,57,43,.55); transform: translateX(-50%) rotate(-4deg); }
  .polaroid.tape-c::before { background: rgba(230,214,180,.72); transform: translateX(-50%) rotate(3deg); left: 30%; }

  /* ---------------- 底部时间线 ---------------- */
  footer.tl {
    flex: 0 0 auto; position: relative; z-index: 5;
    display: flex; align-items: center; gap: 10px;
    padding: 20px 16px calc(14px + env(safe-area-inset-bottom, 0px));
    background: linear-gradient(0deg, rgba(18,13,9,.9), rgba(18,13,9,0));
  }
  .tl-track-wrap {
    flex: 1 1 auto; position: relative; height: 54px;
  }
  .tl-track {
    position: absolute; left: 8px; right: 8px; top: 22px; height: 3px;
    background: rgba(255,255,255,.14); border-radius: 3px; z-index: 1;
    overflow: visible;
  }
  .tl-fill {
    position: absolute; left: 0; top: 0; height: 100%; width: 0%;
    background: var(--red); border-radius: 3px;
    transition: width .45s cubic-bezier(.3,.9,.4,1);
  }
  .tl-fill.dragging { transition: none; }
  .tl-node {
    position: absolute; top: 50%; transform: translate(-50%, -50%);
    display: flex; align-items: center; justify-content: center;
    width: 34px; height: 34px;
    cursor: pointer; z-index: 2; touch-action: none;
  }
  .tl-node .dot {
    width: 9px; height: 9px; border-radius: 50%;
    background: #5a4b3f; border: 2px solid var(--bg);
    box-shadow: 0 0 0 1px rgba(255,255,255,.15);
    transition: background .25s ease, transform .25s ease, box-shadow .25s ease;
  }
  .tl-node.active .dot {
    background: var(--red); transform: scale(1.3);
    box-shadow: 0 0 0 5px var(--red-soft);
  }
  .tl-node .lbl {
    position: absolute; bottom: 31px; left: 50%; transform: translateX(-50%);
    font-size: 11px; color: var(--text-dim); white-space: nowrap;
    transition: color .25s ease, font-weight .25s ease;
  }
  .tl-node.active .lbl { color: var(--text); font-weight: 600; }
  .tl-node .tm {
    position: absolute; top: 29px; left: 50%; transform: translateX(-50%);
    font-size: 10px; color: var(--text-dim); white-space: nowrap;
  }
  .tl-playhead {
    position: absolute; top: 22px; left: 0%;
    width: 18px; height: 18px; margin: -9px 0 0 -9px;
    border-radius: 50%; background: var(--red); border: 3px solid var(--bg);
    box-shadow: 0 2px 10px rgba(192,57,43,.65);
    z-index: 3; cursor: grab; touch-action: none;
    transition: left .45s cubic-bezier(.3,.9,.4,1);
  }
  .tl-playhead.dragging { transition: none; cursor: grabbing; }
  .tl-playhead::after {
    content: ""; position: absolute; inset: -13px; /* 更大触控热区 */
  }
  .play-btn {
    flex: 0 0 auto; width: 46px; height: 46px; border-radius: 50%;
    background: var(--red); color: #fff; border: none; font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 8px 20px rgba(192,57,43,.4);
  }
  .play-btn:active { transform: scale(.93); }

  /* ---------------- 灯箱 ---------------- */
  .lightbox {
    position: fixed; inset: 0; z-index: 50;
    background: rgba(8,5,3,.94);
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none;
    transition: opacity .25s ease;
    padding: 24px;
  }
  .lightbox.open { opacity: 1; pointer-events: auto; }
  .lightbox figure {
    margin: 0; max-width: 92vw; max-height: 86vh;
    display: flex; flex-direction: column; align-items: center; gap: 12px;
  }
  .lightbox img {
    max-width: 92vw; max-height: 76vh; object-fit: contain;
    border-radius: 6px; box-shadow: 0 24px 70px rgba(0,0,0,.6);
    background: #000;
  }
  .lightbox figcaption { font-size: 13px; color: var(--text-dim); letter-spacing: .02em; }
  .lb-close {
    position: absolute; top: calc(14px + env(safe-area-inset-top, 0px)); right: 16px;
    width: 38px; height: 38px; border-radius: 50%; border: 1px solid var(--line);
    background: rgba(255,255,255,.08); color: var(--text); font-size: 20px; line-height: 1;
    display: flex; align-items: center; justify-content: center;
  }
</style>
</head>
<body>
<div id="app">
  <header class="top">
    <div class="top-title">
      <h1>时光轴<span class="sub">那一天的回忆拼贴</span></h1>
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <a href="machine.html" style="display:inline-flex;align-items:center;gap:5px;text-decoration:none;color:rgba(255,255,255,.55);font-size:11px;font-weight:600;border:1px solid rgba(255,255,255,.22);border-radius:12px;padding:5px 11px;-webkit-tap-highlight-color:transparent">▦ 机器视角</a>
      <div class="now-pill"><span class="dot"></span><span id="nowText">—</span></div>
    </div>
  </header>

  <main class="stage" id="stage">
    <div class="collage-layer" id="layerA"></div>
    <div class="collage-layer" id="layerB"></div>
  </main>

  <footer class="tl">
    <div class="tl-track-wrap" id="trackWrap">
      <div class="tl-track" id="track">
        <div class="tl-fill" id="tlFill"></div>
      </div>
      <div class="tl-playhead" id="playhead"></div>
    </div>
    <button class="play-btn" id="playBtn" aria-label="播放">&#9654;</button>
  </footer>
</div>

<div class="lightbox" id="lightbox">
  <button class="lb-close" id="lbClose" aria-label="关闭">&times;</button>
  <figure>
    <img id="lbImg" src="" alt="">
    <figcaption id="lbCap"></figcaption>
  </figure>
</div>

<script src="../tour.js"></script>
<script>
(function () {
  "use strict";

  var TOUR = window.TOUR;
  var app = document.getElementById("app");
  if (!TOUR || !TOUR.nodes || !TOUR.nodes.length) {
    document.getElementById("stage").innerHTML =
      '<div class="boot-error">tour.js 没读到数据(检查 ../tour.js 是否存在)</div>';
    return;
  }

  var nodes = TOUR.nodes;

  // ============================================================
  // 演示层:每个环节直接套用一个真实好看的场景照片(和 journey.html 一致的可插拔映射)。
  // 真素材到位后,把这份映射删掉或改成 node.photos 即可,下面逻辑不用改。
  // ============================================================
  var DEMO_SCENES = {
    jieqin: "comfy_cafe",
    chufa: "entrance_hall",
    yishi: "chapel_day",
    yanxi: "ballroom"
  };

  function photosFor(node) {
    var slug = DEMO_SCENES[node.id];
    var list = [];
    if (slug) {
      for (var i = 1; i <= 9; i++) {
        list.push({ src: "../assets/walkdemo/" + slug + "_j" + i + ".jpg", caption: "现场照片 " + i });
      }
      return list;
    }
    // 兜底:命中不到演示层就回落到 tour.js 原始 photos(相对仓库根,timeline.html 在 viewer/ 下需要补 ../)
    (node.photos || []).slice(0, 9).forEach(function (p, i) {
      var src = p.src || "";
      if (src.indexOf("http") !== 0 && src.indexOf("../") !== 0 && src.indexOf("/") !== 0) {
        src = "../" + src;
      }
      list.push({ src: src, caption: p.caption || ("照片 " + (i + 1)) });
    });
    return list;
  }

  // 固定的拼贴排布参数,索引驱动的确定性伪随机(不用 Math.random,刷新不乱跳)。
  var ROTATIONS = [-3, 2, -1, 2.5, -2, 1.5, -2.5, 3, -1.5];
  var RATIOS = ["4/3", "1/1", "3/4", "1/1", "4/3", "3/4", "1/1", "3/4", "4/3"];

  function buildCollageHTML(node) {
    var photos = photosFor(node);
    return photos.map(function (p, i) {
      var rot = ROTATIONS[i % ROTATIONS.length];
      var ratio = RATIOS[i % RATIOS.length];
      var delay = i * 70;
      var tapeClass = (i % 3 === 0) ? " tape-r" : (i % 3 === 1 ? " tape-c" : "");
      return '<figure class="polaroid' + tapeClass + '" style="--rot:' + rot + 'deg;--delay:' + delay + 'ms">'
        + '<div class="ph-frame" style="--ar:' + ratio + '"><img src="' + p.src + '" alt="" loading="lazy"></div>'
        + '<figcaption>' + p.caption + '</figcaption>'
        + '</figure>';
    }).join("");
  }

  // ============================================================
  // 拼贴交叉淡入淡出(两层轮换,避免快速连点切换时互相清空对方内容)
  // ============================================================
  var layerA = document.getElementById("layerA");
  var layerB = document.getElementById("layerB");
  var activeLayer = layerA;
  var nextLayer = layerB;

  function renderCollage(node) {
    var outgoing = activeLayer;
    var incoming = nextLayer;

    outgoing.classList.remove("active");
    outgoing.classList.add("leaving");

    incoming.innerHTML = buildCollageHTML(node);
    incoming.scrollTop = 0;
    incoming.classList.remove("leaving");
    incoming.classList.add("active");

    setTimeout(function () {
      // 只清理仍处于"leaving"态的那层——防止快速连续切换时,
      // 迟到的清空回调把刚变成 active 的新内容误删。
      if (outgoing.classList.contains("leaving")) {
        outgoing.classList.remove("leaving");
        outgoing.innerHTML = "";
      }
    }, 340);

    activeLayer = incoming;
    nextLayer = outgoing;
  }

  // ============================================================
  // 顶部当前状态
  // ============================================================
  var nowText = document.getElementById("nowText");
  function updateHeader(node) {
    nowText.textContent = (node.chapter || node.name) + " · " + (node.time || "");
  }

  // ============================================================
  // 底部时间线:轨道 + 节点 + 播放头
  // ============================================================
  var track = document.getElementById("track");
  var trackWrap = document.getElementById("trackWrap");
  var tlFill = document.getElementById("tlFill");
  var playhead = document.getElementById("playhead");
  var playBtn = document.getElementById("playBtn");

  var positions = nodes.map(function (n, i) {
    return nodes.length > 1 ? (i / (nodes.length - 1)) * 100 : 0;
  });
  var nodeEls = [];

  nodes.forEach(function (n, i) {
    var el = document.createElement("div");
    el.className = "tl-node";
    el.style.left = positions[i] + "%";
    el.setAttribute("role", "button");
    el.setAttribute("aria-label", (n.chapter || n.name) + " " + (n.time || ""));
    el.innerHTML =
      '<span class="lbl">' + (n.chapter || n.name) + '</span>' +
      '<span class="dot"></span>' +
      '<span class="tm">' + (n.time || "") + '</span>';
    el.addEventListener("click", function () {
      stopAutoplay();
      goToChapter(i);
    });
    track.appendChild(el);
    nodeEls.push(el);
  });

  function setPlayheadPct(pct) {
    playhead.style.left = pct + "%";
    tlFill.style.width = pct + "%";
  }

  function markActiveNode(idx) {
    nodeEls.forEach(function (el, i) {
      el.classList.toggle("active", i === idx);
    });
  }

  var currentIndex = -1;
  function goToChapter(idx) {
    idx = Math.max(0, Math.min(nodes.length - 1, idx));
    if (idx === currentIndex) {
      setPlayheadPct(positions[idx]);
      return;
    }
    currentIndex = idx;
    var node = nodes[idx];
    updateHeader(node);
    renderCollage(node);
    setPlayheadPct(positions[idx]);
    markActiveNode(idx);
  }

  function nearestIndex(pct) {
    var best = 0, bestDist = Infinity;
    positions.forEach(function (p, i) {
      var d = Math.abs(p - pct);
      if (d < bestDist) { bestDist = d; best = i; }
    });
    return best;
  }

  function pctFromClientX(clientX) {
    var rect = track.getBoundingClientRect();
    var x = clientX - rect.left;
    return Math.max(0, Math.min(100, (x / rect.width) * 100));
  }

  // ---- 拖动播放头 ----
  var dragging = false;
  playhead.addEventListener("pointerdown", function (e) {
    dragging = true;
    stopAutoplay();
    playhead.classList.add("dragging");
    tlFill.classList.add("dragging");
    try { playhead.setPointerCapture(e.pointerId); } catch (err) {}
    e.stopPropagation();
    e.preventDefault();
  });
  playhead.addEventListener("pointermove", function (e) {
    if (!dragging) return;
    setPlayheadPct(pctFromClientX(e.clientX));
  });
  function endDrag(e) {
    if (!dragging) return;
    dragging = false;
    playhead.classList.remove("dragging");
    tlFill.classList.remove("dragging");
    var pct = pctFromClientX(e.clientX != null ? e.clientX : parseFloat(playhead.style.left) / 100 * track.getBoundingClientRect().width + track.getBoundingClientRect().left);
    var idx = nearestIndex(pct);
    goToChapter(idx);
  }
  playhead.addEventListener("pointerup", endDrag);
  playhead.addEventListener("pointercancel", endDrag);

  // ---- 点击/触摸轨道任意处直接跳转 ----
  trackWrap.addEventListener("pointerdown", function (e) {
    if (e.target === playhead) return; // 播放头自己的 handler 已处理
    stopAutoplay();
    var idx = nearestIndex(pctFromClientX(e.clientX));
    goToChapter(idx);
  });

  // ============================================================
  // 自动播放
  // ============================================================
  var playing = false;
  var playTimer = null;
  function scheduleNext() {
    clearTimeout(playTimer);
    playTimer = setTimeout(function () {
      if (!playing) return;
      goToChapter((currentIndex + 1) % nodes.length);
      scheduleNext();
    }, 3500);
  }
  function startAutoplay() {
    playing = true;
    playBtn.innerHTML = "&#9208;";
    playBtn.setAttribute("aria-label", "暂停");
    scheduleNext();
  }
  function stopAutoplay() {
    playing = false;
    clearTimeout(playTimer);
    playBtn.innerHTML = "&#9654;";
    playBtn.setAttribute("aria-label", "播放");
  }
  playBtn.addEventListener("click", function () {
    if (playing) stopAutoplay(); else startAutoplay();
  });

  // ============================================================
  // 灯箱:点照片放大
  // ============================================================
  var lightbox = document.getElementById("lightbox");
  var lbImg = document.getElementById("lbImg");
  var lbCap = document.getElementById("lbCap");
  var lbClose = document.getElementById("lbClose");

  function openLightbox(src, cap) {
    lbImg.src = src;
    lbCap.textContent = cap || "";
    lightbox.classList.add("open");
  }
  function closeLightbox() {
    lightbox.classList.remove("open");
  }
  document.getElementById("stage").addEventListener("click", function (e) {
    var card = e.target.closest ? e.target.closest(".polaroid") : null;
    if (!card) return;
    var img = card.querySelector("img");
    var cap = card.querySelector("figcaption");
    if (img) openLightbox(img.src, cap ? cap.textContent : "");
  });
  lbClose.addEventListener("click", closeLightbox);
  lightbox.addEventListener("click", function (e) {
    if (e.target === lightbox) closeLightbox();
  });
  document.addEventListener("keydown", function (e) {
    if (e.key === "Escape") closeLightbox();
  });

  // ============================================================
  // 启动:第一章节直接呈现(无交叉淡出,只做入场动画)
  // ============================================================
  updateHeader(nodes[0]);
  layerA.innerHTML = buildCollageHTML(nodes[0]);
  layerA.classList.add("active");
  setPlayheadPct(positions[0]);
  markActiveNode(0);
  currentIndex = 0;
})();
</script>
</body>
</html>
